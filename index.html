<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 서가 취향 찾기 | 서가 궁중 한과</title>
  <meta property="og:title" content="나의 서가 취향 찾기">
  <meta property="og:description" content="5가지 질문으로 찾는 나만의 궁중 한과 추천">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #2a1f1a;
      color: #f0ebe4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 4rem;
    }

    /* 고정 헤더 로고 */
    .site-header {
      width: 100%;
      max-width: 560px;
      text-align: center;
      padding: 1.5rem 0 0.5rem;
      flex-shrink: 0;
    }
    .site-logo {
      height: 110px;
      width: auto;
      display: inline-block;
    }

    /* 콘텐츠 */
    .wrap { width: 100%; max-width: 560px; flex: 1; }

    /* 인트로 */
    .intro-sub {
      font-size: 15px; color: #c9b8a8; line-height: 1.8;
      text-align: center; margin-bottom: 2.5rem;
    }
    .start-btn {
      display: block; width: 100%; padding: 15px;
      background: #A32D2D; color: #f9dede;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 500; letter-spacing: 0.05em;
      cursor: pointer; transition: background 0.15s; font-family: inherit;
    }
    .start-btn:hover { background: #791F1F; }
    .divider { height: 1px; background: #3e2e26; margin: 1.75rem 0; }
    .tip-text { font-size: 12px; color: #7a6458; text-align: center; letter-spacing: 0.03em; }

    /* 프로그레스 */
    .progress-bar {
      height: 3px; background: #3e2e26;
      border-radius: 999px; margin-bottom: 2rem; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #c04040;
      border-radius: 999px; transition: width 0.4s ease;
    }
    .step-label { font-size: 11px; color: #7a6458; margin-bottom: 0.5rem; letter-spacing: 0.08em; }
    .question { font-size: 20px; font-weight: 500; line-height: 1.5; margin-bottom: 0.4rem; color: #f0ebe4; }
    .question-sub { font-size: 13px; color: #9a8070; margin-bottom: 1.5rem; }

    /* 옵션 버튼 */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt-btn {
      text-align: left; padding: 14px 18px;
      border: 1px solid #3e2e26;
      border-radius: 10px; background: #342520;
      cursor: pointer; font-size: 15px; color: #e0d5cc;
      line-height: 1.5; transition: all 0.15s; font-family: inherit;
    }
    .opt-btn:hover { background: #3e2e26; border-color: #5a3f35; }
    .opt-btn.selected { border-color: #c04040; background: #3d2020; color: #f9c4c4; }

    /* 네비 */
    .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.75rem; }
    .nav-btn {
      padding: 10px 20px; border: 1px solid #3e2e26;
      border-radius: 8px; background: transparent;
      cursor: pointer; font-size: 13px; color: #7a6458; font-family: inherit;
    }
    .nav-btn:hover { background: #342520; }
    .next-btn {
      background: #A32D2D; color: #f9dede; border: none;
      padding: 10px 28px; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 500; font-family: inherit;
    }
    .next-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .next-btn:hover:not(:disabled) { background: #791F1F; }

    /* 결과 */
    .result-wrap { animation: fadeUp 0.5s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .result-eyebrow { font-size: 11px; color: #7a6458; letter-spacing: 0.12em; margin-bottom: 1.25rem; }
    .result-tag {
      display: inline-block; font-size: 12px; padding: 4px 13px;
      border-radius: 999px; background: #3d2020; color: #f9c4c4;
      margin-bottom: 0.75rem; font-weight: 500;
    }
    .result-title { font-size: 22px; font-weight: 500; margin-bottom: 0.5rem; color: #f0ebe4; }
    .result-desc { font-size: 14px; color: #c9b8a8; line-height: 1.8; margin-bottom: 1.75rem; }

    /* 제품 카드 */
    .product-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.5rem; }
    .product-card {
      display: flex; gap: 14px; border: 1px solid #3e2e26;
      border-radius: 12px; padding: 14px; background: #342520; align-items: flex-start;
    }
    .product-img {
      width: 82px; height: 82px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0; background: #2a1f1a;
    }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-size: 14px; font-weight: 500; color: #f0ebe4; margin-bottom: 4px; }
    .product-desc { font-size: 12px; color: #9a8070; line-height: 1.6; margin-bottom: 8px; }
    .product-price { font-size: 13px; font-weight: 500; color: #e07070; margin-bottom: 9px; }
    .product-actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .buy-btn {
      display: inline-block; padding: 6px 13px; background: #A32D2D;
      color: #f9dede; border-radius: 7px; font-size: 12px; font-weight: 500;
      text-decoration: none;
    }
    .buy-btn:hover { background: #791F1F; }
    .review-btn {
      display: inline-block; padding: 6px 13px; border: 1px solid #3e2e26;
      border-radius: 7px; font-size: 12px; color: #c9b8a8;
      text-decoration: none; background: transparent;
    }
    .review-btn:hover { background: #3e2e26; }

    /* 하단 버튼 */
    .view-all {
      display: block; text-align: center; padding: 13px;
      border: 1px solid #A32D2D; border-radius: 10px;
      color: #e07070; font-size: 14px; text-decoration: none;
      margin-bottom: 10px;
    }
    .view-all:hover { background: #3d2020; }
    .restart-btn {
      display: block; width: 100%; padding: 13px;
      border: 1px solid #3e2e26; border-radius: 10px;
      background: transparent; cursor: pointer;
      font-size: 14px; color: #7a6458; font-family: inherit;
    }
    .restart-btn:hover { background: #342520; }

    /* 푸터 */
    .site-footer {
      width: 100%; max-width: 560px;
      text-align: center;
      padding: 2.5rem 0 1.5rem;
      border-top: 1px solid #3e2e26;
      margin-top: 2rem;
    }
    .footer-wm { height: 44px; width: auto; opacity: 0.5; margin-bottom: 8px; }
    .footer-credit { font-size: 11px; color: #5a4a42; letter-spacing: 0.04em; }

    @media (max-width: 400px) {
      .question { font-size: 18px; }
      .product-img { width: 70px; height: 70px; }
      .site-logo { height: 85px; }
    }
  </style>
</head>

        buyLink: "https://seoga.co.kr/product/산서함251-서리태정과-세트/18/category/56/display/1/",
        reviewLink: "https://blog.naver.com/gods-favorite/224234214358"
      },
      {
        name: "한다람 구운 호두정과 4pack",
        desc: "구운 호두정과 15g×4팩\n언제 어디서나 간편하게 즐기는 한입 한과",
        price: "14,800원",
        img: "https://seoga.co.kr/web/product/medium/202512/4ead7f49b7a0bc3210c6d028923e87a1.jpg",
        buyLink: "https://seoga.co.kr/product/한다람-구운-호두정과-4pack/175/category/56/display/1/",
        reviewLink: "https://blog.naver.com/gods-favorite"
      }
    ]
  }
];

let current = 0;
let answers = [];

function startQuiz() {
  document.getElementById('screen-intro').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const selected = answers[current];
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('screen-quiz').innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="step-label">${current + 1} / ${questions.length}</div>
    <div class="question">${q.q}</div>
    ${q.sub ? `<div class="question-sub">${q.sub}</div>` : '<div style="margin-bottom:1.5rem"></div>'}
    <div class="options">
      ${q.options.map((o, i) => `<button class="opt-btn${selected === i ? ' selected' : ''}" onclick="select(${i})">${o.text}</button>`).join('')}
    </div>
    <div class="nav">
      <button class="nav-btn" onclick="prev()" style="${current === 0 ? 'visibility:hidden' : ''}">← 이전</button>
      <button class="next-btn" onclick="next()" ${selected === undefined ? 'disabled' : ''}>
        ${current === questions.length - 1 ? '결과 보기' : '다음 →'}
      </button>
    </div>
  `;
}

function select(i) {
  answers[current] = i;
  renderQuestion();
}

function prev() {
  if (current > 0) { current--; renderQuestion(); }
}

function next() {
  if (answers[current] === undefined) return;
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  const screen = document.getElementById('screen-result');
  screen.style.display = 'block';

  const score = [0, 0, 0, 0];
  const maps = [
    { sweet: 2, special: 0, calm: 2, energetic: 3 },
    { chewy: 3, soft: 2, deep: 1, mixed: 0 },
    { tea: 1, coffee: 3, sikhye: 2, water: 3 },
    { luxury: 0, variety: 0, healthy: 1, daily: 3 },
    { A: 0, B: 1, C: 2, D: 3 }
  ];
  answers.forEach((ans, qi) => {
    const key = questions[qi].options[ans].val;
    const idx = maps[qi][key];
    score[idx]++;
  });
  const top = score.indexOf(Math.max(...score));
  const r = results[top];

  screen.innerHTML = `
    <div class="result-wrap">
      <div class="result-eyebrow">서가 × 나의 취향</div>
      <span class="result-tag">${r.tag}</span>
      <div class="result-title">${r.title}</div>
      <div class="result-desc">${r.desc}</div>
      <div class="product-cards">
        ${r.products.map(p => `
          <div class="product-card">
            <img class="product-img" src="${p.img}" alt="${p.name}" onerror="this.style.background='#2a1f1a'">
            <div class="product-info">
              <div class="product-name">${p.name}</div>
              <div class="product-desc">${p.desc.replace('\n','<br>')}</div>
              <div class="product-price">${p.price}</div>
              <div class="product-actions">
                <a class="buy-btn" href="${p.buyLink}" target="_blank" rel="noopener">구매하기 →</a>
                ${p.reviewLink ? `<a class="review-btn" href="${p.reviewLink}" target="_blank" rel="noopener">제품 리뷰 보러가기</a>` : ''}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      <a class="view-all" href="https://seoga.co.kr/product/list.html?cate_no=56" target="_blank" rel="noopener">서가 전체 제품 보기</a>
      <button class="restart-btn" onclick="restart()">다시 테스트하기</button>
    </div>
  `;
}

function restart() {
  current = 0;
  answers = [];
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-intro').style.display = 'block';
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
